<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Pin de locație stilizat care formează Z -->
  <g>
    <!-- Corpul pin-ului -->
    <path d="M20 4C13.373 4 8 9.373 8 16C8 22.627 20 40 20 40C20 40 32 22.627 32 16C32 9.373 26.627 4 20 4Z" fill="#1B3A6B"/>
    <!-- Punct central al pin-ului -->
    <circle cx="20" cy="16" r="5.5" fill="white"/>
    <!-- Litera Z integrată în pin (linii albe) -->
    <line x1="14.5" y1="12" x2="22.5" y2="12" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="22.5" y1="12" x2="14.5" y2="20" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="14.5" y1="20" x2="22.5" y2="20" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Textul "Zona" -->
  <text x="40" y="33" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#1B3A6B" letter-spacing="-0.5">Zona</text>
  <!-- Textul "Ro" în portocaliu -->
  <text x="114" y="33" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#E85D04" letter-spacing="-0.5">Ro</text>
</svg>
