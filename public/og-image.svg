<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Fundal albastru închis -->
  <rect width="1200" height="630" fill="#1B3A6B"/>
  <!-- Pattern geometric subtil -->
  <circle cx="1100" cy="80" r="200" fill="#243F75" opacity="0.6"/>
  <circle cx="100" cy="550" r="150" fill="#243F75" opacity="0.5"/>
  <!-- Pin mare decorativ dreapta -->
  <g transform="translate(920, 160) scale(3.5)">
    <path d="M20 4C13.373 4 8 9.373 8 16C8 22.627 20 40 20 40C20 40 32 22.627 32 16C32 9.373 26.627 4 20 4Z" fill="white" opacity="0.08"/>
    <circle cx="20" cy="16" r="5.5" fill="white" opacity="0.15"/>
  </g>
  <!-- Logo centrat -->
  <g transform="translate(190, 240)">
    <!-- Pin mic -->
    <path d="M40 8C29.402 8 20 17.402 20 28C20 38.598 40 64 40 64C40 64 60 38.598 60 28C60 17.402 50.598 8 40 8Z" fill="white"/>
    <circle cx="40" cy="28" r="10" fill="#1B3A6B"/>
    <line x1="29" y1="22" x2="46" y2="22" stroke="#E85D04" stroke-width="3" stroke-linecap="round"/>
    <line x1="46" y1="22" x2="29" y2="34" stroke="#E85D04" stroke-width="3" stroke-linecap="round"/>
    <line x1="29" y1="34" x2="46" y2="34" stroke="#E85D04" stroke-width="3" stroke-linecap="round"/>
    <!-- Text Zona -->
    <text x="80" y="56" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">Zona</text>
    <!-- Text Ro -->
    <text x="370" y="56" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#E85D04" letter-spacing="-2">Ro</text>
  </g>
  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" fill="white" opacity="0.75" letter-spacing="0.5">Firme și meșteri din Moldova și estul României</text>
  <!-- Badge județe -->
  <rect x="300" y="430" width="600" height="50" rx="25" fill="white" opacity="0.1"/>
  <text x="600" y="462" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="white" opacity="0.9">Iași · Galați · Bacău · Vaslui · Suceava · Botoșani</text>
